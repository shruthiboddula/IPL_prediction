<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Match Victory Predictor</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: var(--accent); margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #334155;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        button {
            width: 100%;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #0f172a;
            border-radius: 8px;
            display: none;
        }
        .progress-container {
            background-color: #475569;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar {
            background-color: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 IPL Match Victory Predictor</h2>
    
    <div class="form-group">
        <label>Chasing Team (Batting)</label>
        <select id="batting_team">
            <option>Mumbai Indians</option>
            <option>Chennai Super Kings</option>
            <option>Royal Challengers Bangalore</option>
            <option>Kolkata Knight Riders</option>
            <option>Delhi Capitals</option>
            <option>Punjab Kings</option>
            <option>Rajasthan Royals</option>
            <option>Sunrisers Hyderabad</option>
        </select>
    </div>

    <div class="form-group">
        <label>Defending Team (Bowling)</label>
        <select id="bowling_team">
            <option>Chennai Super Kings</option>
            <option>Mumbai Indians</option>
            <option>Royal Challengers Bangalore</option>
            <option>Kolkata Knight Riders</option>
            <option>Delhi Capitals</option>
            <option>Punjab Kings</option>
            <option>Rajasthan Royals</option>
            <option>Sunrisers Hyderabad</option>
        </select>
    </div>

    <div class="form-group">
        <label>Match Host Venue / City</label>
        <select id="city">
            <option>Mumbai</option>
            <option>Chennai</option>
            <option>Bangalore</option>
            <option>Kolkata</option>
            <option>Delhi</option>
            <option>Hyderabad</option>
            <option>Chandigarh</option>
            <option>Jaipur</option>
        </select>
    </div>

    <div class="form-group">
        <label>Target Score Set</label>
        <input type="number" id="target" value="180">
    </div>

    <div class="row">
        <div class="form-group">
            <label>Current Score</label>
            <input type="number" id="score" value="100">
        </div>
        <div class="form-group">
            <label>Overs Bowled (e.g. 12.0)</label>
            <input type="number" step="0.1" id="overs" value="12.0">
        </div>
        <div class="form-group">
            <label>Wickets Fallen</label>
            <input type="number" id="wickets" value="3" max="10">
        </div>
    </div>

    <button onclick="getPrediction()">Predict Win Probability 📈</button>

    <div class="result-box" id="resultBox">
        <h3 style="margin-top: 0; color: var(--accent);">📊 Prediction Analysis:</h3>
        <p id="battingWinText"></p>
        <p id="bowlingWinText"></p>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<script>
    async function getPrediction() {
        const payload = {
            batting_team: document.getElementById('batting_team').value,
            bowling_team: document.getElementById('bowling_team').value,
            city: document.getElementById('city').value,
            target: document.getElementById('target').value,
            score: document.getElementById('score').value,
            overs: document.getElementById('overs').value,
            wickets: document.getElementById('wickets').value
        };

        if(payload.batting_team === payload.bowling_team) {
            alert("Error: Chasing and Defending teams cannot be identical!");
            return;
        }

        try {
            const response = await fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            
            document.getElementById('resultBox').style.display = "block";
            document.getElementById('battingWinText').innerHTML = `<b>${payload.batting_team} (Chasing):</b> ${result.batting_win}%`;
            document.getElementById('bowlingWinText').innerHTML = `<b>${payload.bowling_team} (Defending):</b> ${result.bowling_win}%`;
            document.getElementById('progressBar').style.width = `${result.batting_win}%`;
            
        } catch (error) {
            console.error("Connection failed:", error);
            alert("Could not connect to backend server. Make sure app.py is running!");
        }
    }
</script>
</body>
</html>
